name: Test Python Script Invocation

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue Number to process"
        required: true
        type: number
      owner:
        description: "GitHub Org / Owner name"
        required: true
        type: string
      repo:
        description: "Repository name"
        required: true
        type: string

jobs:
  invoke-zak:
    runs-on: ubuntu-latest

    permissions:
      issues: read
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Resolve inputs
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_number=${{ inputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "owner=${{ inputs.owner }}" >> $GITHUB_OUTPUT
            echo "repo=${{ inputs.repo }}" >> $GITHUB_OUTPUT
          else
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "owner=${{ github.repository_owner }}" >> $GITHUB_OUTPUT
            echo "repo=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Python script and organize output
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          # 1. Create directory
          mkdir -p docs/issues
          
          # 2. Run script with the 3 required arguments
          uv run python src/main.py \
            "${{ steps.resolve.outputs.owner }}" \
            "${{ steps.resolve.outputs.repo }}" \
            ${{ steps.resolve.outputs.issue_number }}
          
          # 3. Move the file generated by main.py to the final path
          mv issue_thread.md docs/issues/issue-${{ steps.resolve.outputs.issue_number }}.md

      - name: Commit and push markdown file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if the file exists to avoid git errors
          FILE_PATH="docs/issues/issue-${{ steps.resolve.outputs.issue_number }}.md"
          if [ -f "$FILE_PATH" ]; then
            git add "$FILE_PATH"
            git commit -m "docs: save issue #${{ steps.resolve.outputs.issue_number }} conversation" || echo "No changes to commit"
            git push
          else
            echo "Error: Output file not found at $FILE_PATH"
            exit 1
          fi